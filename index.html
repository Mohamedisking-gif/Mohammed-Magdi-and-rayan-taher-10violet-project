<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess: The Addawy Challenge</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="jumpscare">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4/3o7TKMGpxx8D1N0s8M/giphy.gif" id="scare-img">
        <audio id="scare-audio" src="https://www.myinstants.com/media/sounds/fnaf-jumpscare.mp3"></audio>
    </div>

    <div class="container">
        <h1>Chess vs. Ahmed El Addawy</h1>
        
        <div class="menu">
            <label>Difficulty:</label>
            <select id="level">
                <option value="1">Level 1: Easy</option>
                <option value="2">Level 2: Normal</option>
                <option value="3">Level 3: IMPOSSIBLE</option>
            </select>
            <button id="startBtn">Start New Game</button>
        </div>

        <div id="status" class="status">Click Start to Play</div>
        <div id="myBoard"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
